apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 40.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    gatus:
      group: auth
    global:
      stopAll: false
      skipEmptyWalArchiveCheck: true
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3BUCKETNAME}"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}"
    authentik:
      credentials:
        email: ${NOREPLYADDRESS}
        password: ${AUTHPASS}
      email:
        from: ${NOREPLYADDRESS}
        host: ${SMTPHOST}
        password: ${SMTPPASS}
        port: 465
        timeout: 10
        useSSL: true
        useTLS: true
        username: ${NOREPLYADDRESS}
      general:
        allowUserChangeEmail: true
        allowUserChangeName: true
        allowUserChangeUsername: false
    ingress:
      main:
        enabled: true
        ingressClassName: external
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
          nginx.ingress.kubernetes.io/ssl-passthrough: "true"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        hosts:
          - host: auth.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
          - host: "*.${DOMAIN_0}"
            paths:
              - path: /outpost.goauthentik.io
                pathType: ImplementationSpecific
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
    cnpg:
      main:
        cluster:
          singleNode: true
        mode: standalone
        backups:
          enabled: true
          credentials: s3
          scheduledBackups:
            - name: daily-backup
              schedule: "0 5 * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false
    metrics:
      # FIXME: Metrics do not work yet
      servermetrics:
        enabled: false
    redis:
      backups:
        enabled: true
        credentials: s3
        retentionPolicy: "7d"
        scheduledBackups:
          - name: daily-backup
            schedule: "0 5 * * *"
            backupOwnerReference: self
            immediate: true
            suspend: false